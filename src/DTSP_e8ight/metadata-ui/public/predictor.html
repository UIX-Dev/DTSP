<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예측기 생성/연동 도구</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #e65100, #f57c00);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 4px;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #69f0ae;
        }

        .status-dot.offline {
            background: #ff5252;
        }

        .stats-row {
            display: flex;
            gap: 16px;
            padding: 20px 30px;
        }

        .stat-card {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #e65100;
        }

        .stat-card .label {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }

        .main {
            padding: 0 30px 30px;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section-header h2 {
            font-size: 16px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header h2 .icon {
            font-size: 20px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            padding: 0 24px;
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #e65100;
            border-bottom-color: #e65100;
            font-weight: 600;
        }

        .tab:hover {
            color: #e65100;
        }

        .tab-content {
            display: none;
            padding: 24px;
        }

        .tab-content.active {
            display: block;
        }

        /* Predictor List */
        .predictor-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .predictor-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            transition: all 0.2s;
            gap: 16px;
        }

        .predictor-item:hover {
            border-color: #f57c00;
            box-shadow: 0 2px 8px rgba(230, 81, 0, 0.1);
        }

        .predictor-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .predictor-icon.regression {
            background: #fff3e0;
        }

        .predictor-icon.classification {
            background: #e3f2fd;
        }

        .predictor-icon.timeseries {
            background: #f3e5f5;
        }

        .predictor-icon.anomaly {
            background: #e8f5e9;
        }

        .predictor-info {
            flex: 1;
        }

        .predictor-info .name {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }

        .predictor-info .desc {
            font-size: 13px;
            color: #888;
            margin-top: 3px;
        }

        .predictor-meta {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .meta-item {
            text-align: center;
        }

        .meta-item .meta-value {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .meta-item .meta-label {
            font-size: 11px;
            color: #999;
        }

        .predictor-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .predictor-status.active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .predictor-status.training {
            background: #fff3e0;
            color: #e65100;
        }

        .predictor-status.inactive {
            background: #fafafa;
            color: #999;
        }

        /* Create Form */
        .form-section {
            margin-bottom: 24px;
        }

        .form-section label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #f57c00;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e65100, #f57c00);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: white;
            border: 1px solid #e65100;
            color: #e65100;
        }

        .btn-outline:hover {
            background: #fff3e0;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        /* API Section */
        .api-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 24px;
        }

        .api-card {
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 16px;
        }

        .api-card .method {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-right: 8px;
        }

        .api-card .method.get {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .api-card .method.post {
            background: #e3f2fd;
            color: #1565c0;
        }

        .api-card .method.put {
            background: #fff3e0;
            color: #e65100;
        }

        .api-card .method.delete {
            background: #ffebee;
            color: #c62828;
        }

        .api-card .path {
            font-family: monospace;
            font-size: 13px;
            color: #333;
        }

        .api-card .api-desc {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        /* Model Types */
        .model-types {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .model-type-card {
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-type-card:hover {
            border-color: #f57c00;
            box-shadow: 0 4px 12px rgba(230, 81, 0, 0.1);
        }

        .model-type-card.selected {
            border-color: #e65100;
            background: #fff3e0;
        }

        .model-type-card .type-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .model-type-card .type-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .model-type-card .type-desc {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state .empty-title {
            font-size: 16px;
            font-weight: 600;
            color: #666;
        }

        .empty-state .empty-desc {
            font-size: 13px;
            margin-top: 8px;
        }

        /* Connection info */
        .connection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            padding: 24px;
        }

        .connection-card {
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 16px;
        }

        .connection-card .conn-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .connection-card .conn-value {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }

        .connection-card .conn-status {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .conn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .conn-dot.ok {
            background: #4caf50;
        }

        .conn-dot.fail {
            background: #f44336;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #f0f0f0;
            border-top-color: #e65100;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <h1>🔮 예측기 생성/연동 도구</h1>
            <p>Predictor Creator & Integration Tool</p>
        </div>
        <div class="header-right">
            <div class="status-badge" id="serviceBadge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">확인 중...</span>
            </div>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="value" id="totalPredictors">-</div>
            <div class="label">전체 예측기</div>
        </div>
        <div class="stat-card">
            <div class="value" id="activePredictors">-</div>
            <div class="label">활성 상태</div>
        </div>
        <div class="stat-card">
            <div class="value" id="modelTypes">4</div>
            <div class="label">모델 유형</div>
        </div>
        <div class="stat-card">
            <div class="value" id="apiEndpoints">-</div>
            <div class="label">API 엔드포인트</div>
        </div>
    </div>

    <div class="main">
        <div class="section-card">
            <div class="tabs">
                <div class="tab active" data-tab="predictors">예측기 목록</div>
                <div class="tab" data-tab="create">새 예측기 생성</div>
                <div class="tab" data-tab="api">API 정보</div>
                <div class="tab" data-tab="connection">연결 설정</div>
            </div>

            <!-- Tab 1: Predictor List -->
            <div class="tab-content active" id="tab-predictors">
                <div id="predictorListContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>

            <!-- Tab 2: Create New Predictor -->
            <div class="tab-content" id="tab-create">
                <h3 style="margin-bottom: 20px; font-size: 16px;">모델 유형 선택</h3>
                <div class="model-types" id="modelTypeSelector">
                    <div class="model-type-card" data-type="regression" onclick="selectModelType(this)">
                        <div class="type-icon">📈</div>
                        <div class="type-name">회귀 분석</div>
                        <div class="type-desc">Regression</div>
                    </div>
                    <div class="model-type-card" data-type="classification" onclick="selectModelType(this)">
                        <div class="type-icon">🏷️</div>
                        <div class="type-name">분류</div>
                        <div class="type-desc">Classification</div>
                    </div>
                    <div class="model-type-card" data-type="timeseries" onclick="selectModelType(this)">
                        <div class="type-icon">📊</div>
                        <div class="type-name">시계열 예측</div>
                        <div class="type-desc">Time Series</div>
                    </div>
                    <div class="model-type-card" data-type="anomaly" onclick="selectModelType(this)">
                        <div class="type-icon">🔍</div>
                        <div class="type-name">이상 탐지</div>
                        <div class="type-desc">Anomaly Detection</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>예측기 이름 *</label>
                        <input type="text" id="predictorName" placeholder="예: 온도 예측 모델">
                    </div>
                    <div class="form-group">
                        <label>알고리즘</label>
                        <select id="algorithm">
                            <option value="">선택하세요</option>
                            <option value="linear">Linear Regression</option>
                            <option value="random_forest">Random Forest</option>
                            <option value="xgboost">XGBoost</option>
                            <option value="lstm">LSTM</option>
                            <option value="arima">ARIMA</option>
                            <option value="prophet">Prophet</option>
                            <option value="isolation_forest">Isolation Forest</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>데이터 소스 Entity Type</label>
                        <input type="text" id="entityType" placeholder="예: urn:ngsi-ld:TemperatureSensor">
                    </div>
                    <div class="form-group">
                        <label>대상 속성</label>
                        <input type="text" id="targetAttribute" placeholder="예: temperature">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>학습 데이터 기간</label>
                        <select id="trainingPeriod">
                            <option value="7d">최근 7일</option>
                            <option value="30d" selected>최근 30일</option>
                            <option value="90d">최근 90일</option>
                            <option value="1y">최근 1년</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>예측 주기</label>
                        <select id="predictionInterval">
                            <option value="1m">1분</option>
                            <option value="5m" selected>5분</option>
                            <option value="15m">15분</option>
                            <option value="1h">1시간</option>
                            <option value="1d">1일</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>설명</label>
                    <textarea id="predictorDesc" placeholder="예측기에 대한 설명을 입력하세요..."></textarea>
                </div>

                <div class="btn-group" style="justify-content: flex-end;">
                    <button class="btn btn-secondary" onclick="resetForm()">초기화</button>
                    <button class="btn btn-primary" onclick="createPredictor()">🔮 예측기 생성</button>
                </div>
            </div>

            <!-- Tab 3: API Info -->
            <div class="tab-content" id="tab-api">
                <div class="api-grid" id="apiGrid" style="padding: 0;">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Tab 4: Connection Settings -->
            <div class="tab-content" id="tab-connection">
                <div class="connection-grid" id="connectionGrid" style="padding: 0;">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const GATEWAY_URL = '/api/manager';

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Model type selection
        let selectedModelType = null;
        function selectModelType(el) {
            document.querySelectorAll('.model-type-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedModelType = el.dataset.type;
        }

        // Check gateway connectivity
        async function checkStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            try {
                const resp = await fetch(GATEWAY_URL + '/contexts', {
                    headers: { 'Accept': 'application/json' }
                });
                if (resp.ok) {
                    dot.classList.remove('offline');
                    text.textContent = '연결됨';
                } else {
                    dot.classList.add('offline');
                    text.textContent = '응답 오류';
                }
            } catch (e) {
                dot.classList.add('offline');
                text.textContent = '연결 실패';
            }
        }

        // Load predictor list (demo - since no real predictor service exists)
        async function loadPredictors() {
            const container = document.getElementById('predictorListContainer');

            // Try to check if any data models exist that could be used for prediction
            let dataModels = [];
            try {
                const resp = await fetch(GATEWAY_URL + '/contexts', {
                    headers: { 'Accept': 'application/json' }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    if (Array.isArray(data)) {
                        dataModels = data;
                    }
                }
            } catch (e) {
                // Gateway not available
            }

            // Show empty state with helpful info
            const totalPredictors = 0;
            document.getElementById('totalPredictors').textContent = totalPredictors;
            document.getElementById('activePredictors').textContent = '0';
            document.getElementById('apiEndpoints').textContent = dataModels.length > 0 ? '3' : '0';

            if (totalPredictors === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔮</div>
                        <div class="empty-title">예측기가 없습니다</div>
                        <div class="empty-desc">
                            "새 예측기 생성" 탭에서 새로운 예측 모델을 생성하세요.<br>
                            ${dataModels.length > 0
                        ? `현재 <strong>${dataModels.length}</strong>개의 데이터 컨텍스트가 사용 가능합니다.`
                        : '데이터 모델을 먼저 등록해야 합니다.'
                    }
                        </div>
                        <button class="btn btn-primary" style="margin-top: 16px;" onclick="document.querySelectorAll('.tab')[1].click()">
                            + 새 예측기 생성
                        </button>
                    </div>
                `;
            }
        }

        // Populate API info
        function loadApiInfo() {
            const apis = [
                { method: 'GET', path: '/ndxpro/v1/manager/contexts', desc: '등록된 컨텍스트 목록 조회' },
                { method: 'POST', path: '/ndxpro/v1/manager/datamodels', desc: '데이터 모델 등록' },
                { method: 'GET', path: '/ndxpro/v1/manager/datamodels', desc: '데이터 모델 목록 조회' },
                { method: 'GET', path: '/ndxpro/v1/service/entities', desc: '엔터티 데이터 조회' },
                { method: 'POST', path: '/predictor/train', desc: '예측 모델 학습 시작' },
                { method: 'GET', path: '/predictor/predict', desc: '예측 결과 조회' },
            ];
            const grid = document.getElementById('apiGrid');
            grid.innerHTML = apis.map(api => `
                <div class="api-card">
                    <span class="method ${api.method.toLowerCase()}">${api.method}</span>
                    <span class="path">${api.path}</span>
                    <div class="api-desc">${api.desc}</div>
                </div>
            `).join('');
        }

        // Connection settings
        async function loadConnections() {
            const connections = [
                { label: 'Gateway URL', value: window.location.origin, check: '/api/manager/contexts' },
                { label: 'Data Manager', value: 'localhost:54008', check: '/api/manager/contexts' },
                { label: 'Data Service', value: 'localhost:54007', check: null },
            ];

            const grid = document.getElementById('connectionGrid');
            grid.innerHTML = connections.map(conn => `
                <div class="connection-card">
                    <div class="conn-label">${conn.label}</div>
                    <div class="conn-value">${conn.value}</div>
                    <div class="conn-status" id="conn-${conn.label.replace(/\s/g, '')}">
                        <span class="conn-dot" style="background:#999"></span>
                        <span>확인 중...</span>
                    </div>
                </div>
            `).join('');

            // Check connectivity
            for (const conn of connections) {
                const el = document.getElementById('conn-' + conn.label.replace(/\s/g, ''));
                if (conn.check) {
                    try {
                        const resp = await fetch(conn.check, { headers: { 'Accept': 'application/json' } });
                        el.innerHTML = resp.ok
                            ? '<span class="conn-dot ok"></span><span style="color:#2e7d32">연결됨</span>'
                            : `<span class="conn-dot fail"></span><span style="color:#f44336">오류 (${resp.status})</span>`;
                    } catch (e) {
                        el.innerHTML = '<span class="conn-dot fail"></span><span style="color:#f44336">연결 실패</span>';
                    }
                } else {
                    el.innerHTML = '<span class="conn-dot" style="background:#999"></span><span style="color:#999">직접 연결 불가</span>';
                }
            }
        }

        function createPredictor() {
            const name = document.getElementById('predictorName').value.trim();
            if (!name) {
                alert('예측기 이름을 입력하세요.');
                return;
            }
            if (!selectedModelType) {
                alert('모델 유형을 선택하세요.');
                return;
            }
            alert(`예측기 "${name}" 생성 요청이 전송되었습니다.\n\n참고: 예측기 서비스가 현재 설정되지 않았습니다. 예측기 서비스를 배포한 후 다시 시도하세요.`);
        }

        function resetForm() {
            document.getElementById('predictorName').value = '';
            document.getElementById('algorithm').value = '';
            document.getElementById('entityType').value = '';
            document.getElementById('targetAttribute').value = '';
            document.getElementById('predictorDesc').value = '';
            document.querySelectorAll('.model-type-card').forEach(c => c.classList.remove('selected'));
            selectedModelType = null;
        }

        // Init
        checkStatus();
        loadPredictors();
        loadApiInfo();
        loadConnections();
    </script>
</body>

</html>
